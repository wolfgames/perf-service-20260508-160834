      - "CourseStartInterstitial.tsx: SolidJS DOM overlay rendered over game canvas before GPU init. Shows district+course descriptor string. GSAP fade-in 200ms, auto-dismiss after 1.5s via GSAP delayedCall, tap-to-skip via pointerup. Positioned center of viewport."
    definition_of_done:
      - "acceptance[] tests go red then green"
      - "integration call site exists at files.integration (CourseStartInterstitial shown from GameController before course start)"
      - "every file in files.integration is exercised by at least one acceptance test"
