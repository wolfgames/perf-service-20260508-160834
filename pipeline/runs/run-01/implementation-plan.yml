  # ── BATCH 8 ─────────────────────────────────────────────────────────────────
  - id: 8
    name: "Progression Screens — District Map + District Complete"
    priority: P2
    player_visible: >
      After reaching the start screen, a district map overlay shows course nodes (locked/unlocked/
      complete) with star counts. Tapping an unlocked course node starts that course. After completing
      all 8 courses in a district, a District Complete overlay shows total stars and a Next District
      button.
    features:
      - district-map-screen
      - district-complete-screen
    cos_covered: []
    ux_zones:
      thumb_zone: [center]
      touch_targets: [course-nodes, next-district-button]
      feedback_surfaces: [district-map, course-node-stars, lock-state, district-name, total-stars]
    acceptance:
      # district-map-screen
      - given: "player navigates to start screen after first play"
        should: "DistrictMapOverlay is visible, showing 3 districts with course nodes"
      - given: "only course 0 has been completed"
        should: "course 0 shows star count, course 1 is unlocked, courses 2–7 show lock icon '🔒'"
      - given: "player taps an unlocked course node"
        should: "CourseStartInterstitial fires for that course then gameplay begins"
      - given: "player taps a locked node"
        should: "node shakes (rejection animation) — no navigation fires"
      # district-complete-screen
      - given: "all 8 courses in a district are completed"
        should: "DistrictCompleteOverlay shows district name, total stars collected, Next District button"
      - given: "Next District button is tapped"
        should: "next district's course 0 unlocks and district map scrolls to it"
      # in-memory only — no persistence
      - given: "page is reloaded"
        should: "unlock state resets to default (only district-0/course-0 unlocked)"
    test_loci:
      - describe: "DistrictMapOverlay — lock/unlock state"
        file: "tests/game/platformrush/screens/DistrictMapOverlay.test.ts"
        cases:
          - "initial state: only district-0 course-0 unlocked"
          - "locked node tap plays rejection animation"
          - "unlocked node tap initiates course start"
          - "completed node shows star count"
      - describe: "DistrictCompleteOverlay — trigger and navigation"
        file: "tests/game/platformrush/screens/DistrictCompleteOverlay.test.ts"
        cases:
          - "shown after all 8 courses complete"
          - "Next District unlocks next district course-0"
    files:
      state: []
      integration:
        - src/game/screens/StartScreen.tsx
        - src/game/platformrush/screens/DistrictMapOverlay.tsx
        - src/game/platformrush/screens/DistrictCompleteOverlay.tsx
      test:
        - tests/game/platformrush/screens/DistrictMapOverlay.test.ts
        - tests/game/platformrush/screens/DistrictCompleteOverlay.test.ts
    how:
      - "DistrictMapOverlay.tsx: SolidJS DOM overlay on start screen. Read district/course unlock state from in-memory signal (not ECS — complex nested object per SolidJS patterns for state that survives game destroy). Render 3 district rows × 8 course nodes. Course node: 48×48 px button, emoji '⭐'/'🔒'/'○' per state. Locked tap → GSAP horizontal shake 200ms."
      - "DistrictCompleteOverlay.tsx: shown after all 8 courses complete. Renders over results screen as a branch. Shows total stars, Next District button. Next District dispatches unlock to the in-memory progression store."
    definition_of_done:
      - "acceptance[] tests go red then green"
      - "integration call site exists at files.integration (DistrictMapOverlay shown from StartScreen, DistrictCompleteOverlay shown from ResultsScreen)"
      - "every file in files.integration is exercised by at least one acceptance test"
      - "touch targets ≥ 44 px: course nodes ≥ 48×48 px, Next District button ≥ 44×44 px"
      - "no screen ID violations: district map is overlay on 'start', district complete is branch of 'results' — no new top-level screen IDs"
      - "bun run build + bun run test pass within 3 fix cycles"
    risk: MEDIUM
    risk_reason: "Progression state lives in SolidJS signal (complex nested object, survives game destroy). In-memory only — resets on reload by design. Verify lock/unlock logic with unit tests using deterministic state fixtures."

