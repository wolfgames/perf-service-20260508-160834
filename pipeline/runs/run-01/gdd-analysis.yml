# ─────────────────────────────────────────────────────────────────────────────
# CONFLICTS
# ─────────────────────────────────────────────────────────────────────────────
conflicts:
  - id: game-controller-stub
    sub: replace
    reason: "DOM-mode placeholder must be replaced with Pixi GameController. Architecture is incompatible — DOM div cannot host the GPU canvas game loop, physics engine, or ECS integration the GDD requires. Infrastructure (contract interface, screen wiring) is reused; implementation is replaced."

  - id: results-screen-language
    sub: adapt
    reason: "Change 'Game Over' heading to 'Nice try!' and split into win/loss branches. Infrastructure (screen ID, navigation, score display) is preserved — only copy and branch logic change."

# ─────────────────────────────────────────────────────────────────────────────
# RISK AREAS
# ─────────────────────────────────────────────────────────────────────────────
risk_areas:
  - feature: game-controller-stub
    reason: "Central integration point. Replacing DOM stub with Pixi GameController touches renderer, ECS, physics, input, HUD, asset loading, and state bridge simultaneously. Every other PLAY feature depends on it. If this breaks, the game screen is blank."

  - feature: ecs-plugin
    reason: "New ECS plugin defines the entire state schema. Property order is runtime-enforced; wrong order causes silent failures. All actions must be pure (no Pixi, no Math.random, no DOM) — violations break ECS purity and testability."

  - feature: physics-engine
    reason: "Viewport-affecting logic: runner position, scroll offset, and platform collision all feed the renderer. Physics bugs manifest as visual glitches or unplayable courses. Deterministic output required for solvability validation and benchmark reproducibility."

  - feature: level-generation-system
    reason: "Touches multiple systems: RNG, platform sequence, obstacle placement, token placement, solvability validation. A generation bug can produce unplayable courses silently. Retry + fallback chain reduces risk but adds complexity."

# ─────────────────────────────────────────────────────────────────────────────
# OPEN QUESTIONS
# ─────────────────────────────────────────────────────────────────────────────
open_questions:
  - id: q-game-name
    question: "What is the game slug (directory name under src/game/)?"
    context: "GDD title is 'PlatformRush'. Slug candidates: platformrush, platform-rush. Plan resolves this and substitutes <game-root>."

  - id: q-scoring-dimensions
    question: "Does PlatformRush scoring include any multiplier beyond token-count and star thresholds?"
    context: "GDD specifies +10 per token and star thresholds (1/2/3 stars). No speed bonus, chain multiplier, or efficiency bonus is defined. Scoring CoS (core pass) requires at least 2 multiplicative dimensions. Current formula is additive only. Plan must decide: add a time-bonus or completion-speed multiplier, or document a rationale for why token-count + star-threshold satisfies the CoS base requirement."

  - id: q-district-progression-persistence
    question: "Where is district/course unlock state persisted between sessions?"
    context: "GDD describes district map with locked/unlocked/complete course nodes and star counts. No persistence mechanism is specified (localStorage, server-side, etc.). Core pass can keep unlock state in-memory (resets on reload) but plan should flag if a persistence layer is needed."

