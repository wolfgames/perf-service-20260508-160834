  - id: level-generation-system
    name: "Level generation — seeded procedural algorithm"
    status: new
    lifecycle_phase: PLAY
    risk: HIGH
    complexity: high
    cos_required: [core-interaction, skill-curve]
    affected_files:
      - <game-root>/logic/levelGenerator.ts
      - <game-root>/logic/rng.ts
      - <game-root>/logic/solvabilityValidator.ts
    dependencies: [ecs-plugin]
    ux:
      discovery: "Each course feels fresh via procedural variation; same seed = same course (benchmark repeatability)"
      feedback: "N/A — pure logic"
      onboarding: "Courses 1-2 per district are hand-crafted for safe introduction"
    notes: >
      Pure logic — no Math.random(), no Pixi imports, per ecs-state.mdc action purity.
      RNG: deterministic LCG: next = (seed × 1664525 + 1013904223) mod 2^32
      Seed: (districtIndex * 1000 + courseIndex) * 48271
      6-step algorithm: seed → difficulty params → platform sequence → obstacle placement
        → token placement → solvability validation
      Difficulty bands:
        L0-7: gapRangeMax=2, obstacleChance=0.05, crumblingChance=0, bouncyChance=0
        L8-15: gapRangeMax=3, obstacleChance=0.15, crumblingChance=0.1, bouncyChance=0.05
        L16+: gapRangeMax=4, obstacleChance=0.25, crumblingChance=0.2, bouncyChance=0.1
      Rejection conditions: GAP_TOO_WIDE, TOO_MANY_CONSECUTIVE_CRUMBLING, COURSE_TOO_SHORT
      Retry: up to 10 attempts (seed+1 each retry). Fallback: hand-crafted JSON fixture.
      skill-curve CoS: gated at meta pass — flag status: deferred-to-pass-meta for full difficulty tuning.
      core-interaction is required now: generation must produce a solvable, interactive course.

