    notes: >
      Pure logic file — no Pixi imports per ecs-state.mdc action purity rules.
      Rules from GDD:
        gravity: 9.8 × 64 px/s² constant every frame
        short-hop: apex 96 px, arc 400 ms (200 up/200 down)
        long-leap: apex scales 96→160 px, duration 400→600 ms (hold 150→500 ms)
        hold > 500 ms clamped to 500 ms behavior
        no double-jump (AIRBORNE state blocks input)
        horizontal scroll speed: constant 180 px/s
      RNG state: closure variable (not ECS), per ecs-state.mdc.
      Returns animation-event objects — controller animates via GSAP.

